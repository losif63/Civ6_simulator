<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Civ6 Simulator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Civ6 Map Simulator</h1>
      <div id="controls">
        <label>Map Size
          <select id="cfg-map-size">
            <option value="44x26">Duel (44×26)</option>
            <option value="60x38">Tiny (60×38)</option>
            <option value="74x26">Small (74×26)</option>
            <option value="84x54" selected>Standard (84×54)</option>
            <option value="96x60">Large (96×60)</option>
            <option value="106x66">Huge (106×66)</option>
          </select>
        </label>
        <label>Seed    <input id="cfg-seed"        type="number" value="42"  /></label>
        <label>Continents <input id="cfg-continents" type="number" value="3" min="1" max="8" /></label>
        <label>World Age
          <select id="cfg-world-age">
            <option value="1">New (Rugged)</option>
            <option value="2" selected>Normal</option>
            <option value="3">Old (Flat)</option>
          </select>
        </label>
        <label>Temperature
          <select id="cfg-temperature">
            <option value="1">Hot</option>
            <option value="2" selected>Normal</option>
            <option value="3">Cold</option>
          </select>
        </label>
        <label>Rainfall
          <select id="cfg-rainfall">
            <option value="1">Arid</option>
            <option value="2" selected>Normal</option>
            <option value="3">Wet</option>
          </select>
        </label>
        <button id="btn-generate">Generate Map</button>
        <button id="btn-reset-view">Reset View</button>
      </div>
    </header>

    <div id="map-container">
      <canvas id="map-canvas"></canvas>
    </div>

    <div id="tile-info">
      <span id="tile-info-text">Hover over a tile for details</span>
    </div>
  </div>

  <script src="/static/renderer.js"></script>
</body>
</html>
